name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Lint
        uses: flox/activate-action@v1
        with:
          command: rake lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Run unit tests
        uses: flox/activate-action@v1
        with:
          command: rake test

  tier1:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      matrix:
        shard: ["1/2", "2/2"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Run integration tests (shard ${{ matrix.shard }})
        uses: flox/activate-action@v1
        with:
          command: rake tier1
        env:
          SHARD: ${{ matrix.shard }}

  tier2:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Run tier2 tests (webp presence)
        uses: flox/activate-action@v1
        with:
          command: rake tier2

  deploy:
    runs-on: ubuntu-latest
    needs: [tier1, tier2]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Deploy to Cloudflare Pages
        uses: flox/activate-action@v1
        with:
          command: rake deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Run Lighthouse CI against live site
        uses: flox/activate-action@v1
        with:
          command: rake lighthouse
