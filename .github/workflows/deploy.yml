name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Run unit tests
        uses: flox/activate-action@v1
        with:
          command: rake test

  tier1:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Run tier1 integration tests
        uses: flox/activate-action@v1
        with:
          command: rake tier1

  deploy:
    runs-on: ubuntu-latest
    needs: tier1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Deploy to Cloudflare Pages
        uses: flox/activate-action@v1
        with:
          command: rake deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
